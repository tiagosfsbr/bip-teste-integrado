spring:
  application:
    name: beneficios-api

  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        "[format_sql]": true
        jdbc:
          "[batch_size]": 20
          "[fetch_size]": 50
        "[order_inserts]": true
        "[order_updates]": true

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080
  servlet:
    context-path: /

springdoc:
  swagger-ui:
    enabled: true
    operationsSorter: method
    tagsSorter: alpha

logging:
  level:
    root: INFO
    '[com.example.backend]': DEBUG
    '[org.springframework.web]': INFO
    '[org.hibernate]': INFO
